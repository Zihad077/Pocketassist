<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pocketassist</title>
    
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Markdown Parser (Marked.js) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Syntax Highlighting (Optional but nice) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        :root {
            --bg-color: #212121;
            --header-bg: #212121;
            --input-bg: #2f2f2f;
            --user-bubble: #2f2f2f;
            --bot-accent: #3b82f6; /* Pocketassist Blue */
            --text-main: #ececec;
            --text-muted: #b4b4b4;
            --error-color: #ef4444;
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh; /* Fallback */
            height: 100dvh; /* Dynamic viewport height */
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            position: fixed; /* Fixes bouncing on iOS */
            top: 0; left: 0;
        }

        /* --- Header --- */
        header {
            padding: 12px 16px;
            padding-top: max(12px, env(safe-area-inset-top));
            display: flex; justify-content: space-between; align-items: center;
            background: var(--header-bg);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            z-index: 10;
        }

        .brand {
            font-size: 16px; font-weight: 600; color: #fff;
            display: flex; align-items: center; gap: 8px;
        }
        .brand span { color: var(--bot-accent); }

        .icon-btn {
            background: none; border: none; color: var(--text-main);
            padding: 8px; border-radius: 8px; cursor: pointer;
        }
        .icon-btn:active { background: rgba(255,255,255,0.1); }

        /* --- Chat Area --- */
        #chat-box {
            flex: 1;
            padding: 20px 16px;
            overflow-y: auto;
            display: flex; flex-direction: column; gap: 24px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .msg-row { display: flex; width: 100%; opacity: 0; animation: fadeIn 0.3s forwards; }
        
        .msg-row.user { justify-content: flex-end; }
        .msg-row.user .bubble {
            background: var(--user-bubble);
            padding: 10px 16px;
            border-radius: 20px;
            max-width: 80%;
            font-size: 15px;
            line-height: 1.5;
        }

        .msg-row.bot { justify-content: flex-start; gap: 12px; }
        .avatar {
            width: 30px; height: 30px; border-radius: 50%;
            background: var(--bot-accent);
            display: flex; justify-content: center; align-items: center;
            flex-shrink: 0;
        }
        .msg-row.bot .content {
            max-width: 88%; font-size: 15px; line-height: 1.6;
            color: var(--text-main);
        }

        /* Markdown & Code Styles */
        .content p { margin: 0 0 12px 0; }
        .content p:last-child { margin: 0; }
        .content strong { font-weight: 600; color: #fff; }
        
        /* Code Block Container */
        .content pre {
            background: #0d0d0d;
            border-radius: 8px;
            margin: 12px 0;
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        /* Code Header (Language + Copy) */
        .code-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 6px 12px;
            background: rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 12px; color: #888;
            border-top-left-radius: 8px; border-top-right-radius: 8px;
        }
        
        .copy-btn {
            background: none; border: none; color: #b4b4b4; cursor: pointer; font-size: 11px;
            display: flex; align-items: center; gap: 4px;
        }
        .copy-btn:hover { color: #fff; }

        .content code {
            font-family: 'Menlo', 'Consolas', monospace;
            font-size: 13px;
        }
        .content pre code {
            display: block; padding: 12px;
            overflow-x: auto; color: #e2e2e2;
        }
        .content p code {
            background: rgba(255,255,255,0.15);
            padding: 2px 5px; border-radius: 4px; font-size: 0.9em;
        }

        /* Error Message Style */
        .error-msg {
            color: var(--error-color);
            background: rgba(239, 68, 68, 0.1);
            padding: 10px; border-radius: 8px;
            border: 1px solid rgba(239, 68, 68, 0.2);
            font-size: 14px; margin-top: 5px;
        }

        /* --- Input Area --- */
        .input-wrapper {
            padding: 12px 16px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            background: var(--bg-color);
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .input-box {
            display: flex; align-items: flex-end; gap: 10px;
            background: var(--input-bg);
            padding: 8px 8px 8px 16px;
            border-radius: 26px;
            min-height: 44px;
        }

        #user-input {
            flex: 1; background: transparent; border: none; outline: none;
            color: var(--text-main); font-size: 16px; /* 16px prevents iOS zoom */
            max-height: 120px; overflow-y: auto;
            padding: 4px 0; line-height: 1.4;
            font-family: inherit; resize: none;
        }

        #send-btn {
            background: #4b4b4b; color: #212121;
            width: 32px; height: 32px; border-radius: 50%;
            border: none; display: flex; justify-content: center; align-items: center;
            cursor: pointer; flex-shrink: 0; transition: 0.2s;
            margin-bottom: 2px;
        }
        #send-btn.active { background: #fff; color: #000; }
        #send-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Blinking Cursor */
        .typing-cursor {
            width: 8px; height: 8px; background: #fff; border-radius: 50%;
            animation: blink 1s infinite; display: inline-block;
        }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div class="brand">Pocketassist <span>AI</span></div>
        <button class="icon-btn" onclick="clearChat()" title="Clear Chat">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
        </button>
    </header>

    <div id="chat-box"></div>

    <div class="input-wrapper">
        <div class="input-box">
            <textarea id="user-input" rows="1" placeholder="Message Pocketassist..." oninput="autoResize(this)"></textarea>
            <button id="send-btn" disabled>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
            </button>
        </div>
    </div>
</div>

<script>
    // ---------------------------------------------------------
    // 🔴 IMPORTANT: PASTE YOUR API KEY INSIDE THE QUOTES BELOW
    // ---------------------------------------------------------
    const API_KEY = "YOUR_API_KEY_HERE"; 
    // ---------------------------------------------------------

    const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
    
    // Telegram SDK
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    // DOM Elements
    const chatBox = document.getElementById("chat-box");
    const userInput = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");
    let conversationHistory = [];

    // --- FIX: VISUAL VIEWPORT (Prevents keyboard covering input) ---
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            document.getElementById('app').style.height = `${window.visualViewport.height}px`;
            scrollToBottom();
        });
    }

    // Initialize
    window.onload = () => {
        const userName = tg.initDataUnsafe?.user?.first_name || "there";
        appendBotMessage(`Hello ${userName}! I'm Pocketassist. How can I help?`);
    };

    // Auto-resize textarea
    function autoResize(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
        
        if (textarea.value.trim().length > 0) {
            sendBtn.classList.add('active');
            sendBtn.disabled = false;
        } else {
            sendBtn.classList.remove('active');
            sendBtn.disabled = true;
        }
    }

    // Handle Enter Key (Shift+Enter for new line)
    userInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            if (!sendBtn.disabled) sendMessage();
        }
    });
    
    sendBtn.addEventListener("click", sendMessage);

    function clearChat() {
        conversationHistory = [];
        chatBox.innerHTML = "";
        appendBotMessage("Chat cleared. Ready when you are!");
    }

    function scrollToBottom() {
        setTimeout(() => chatBox.scrollTop = chatBox.scrollHeight, 50);
    }

    function appendUserMessage(text) {
        const div = document.createElement("div");
        div.className = "msg-row user";
        div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
        chatBox.appendChild(div);
        scrollToBottom();
    }

    function appendBotMessage(text, isError = false) {
        const div = document.createElement("div");
        div.className = "msg-row bot";
        
        // Icon
        const icon = isError ? 
            `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>` : 
            `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>`;

        let contentHtml;
        
        if (isError) {
            contentHtml = `<div class="error-msg">${text}</div>`;
        } else if (typeof marked !== 'undefined') {
            // Configure marked for safety
            contentHtml = marked.parse(text);
        } else {
            // Fallback if marked.js fails
            contentHtml = `<p>${escapeHtml(text)}</p>`;
        }

        div.innerHTML = `
            <div class="avatar" style="${isError ? 'background:#ef4444' : ''}">${icon}</div>
            <div class="content">${contentHtml}</div>
        `;
        
        chatBox.appendChild(div);
        
        // Apply syntax highlighting and copy buttons to new code blocks
        if (!isError) {
            div.querySelectorAll('pre code').forEach((block) => {
                if (typeof hljs !== 'undefined') hljs.highlightElement(block);
                addCopyButton(block);
            });
        }
        
        scrollToBottom();
    }

    function showTyping() {
        const div = document.createElement("div");
        div.className = "msg-row bot";
        div.id = "typing-indicator";
        div.innerHTML = `
            <div class="avatar"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg></div>
            <div class="content"><div class="typing-cursor"></div></div>
        `;
        chatBox.appendChild(div);
        scrollToBottom();
    }

    function removeTyping() {
        const el = document.getElementById("typing-indicator");
        if (el) el.remove();
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        // 🛡️ API KEY CHECK
        if (API_KEY === "YOUR_API_KEY_HERE" || API_KEY.length < 10) {
            alert("⚠️ Please open the HTML file and paste your Gemini API Key in the code!");
            return;
        }

        userInput.value = "";
        userInput.style.height = 'auto'; // Reset height
        sendBtn.classList.remove('active');
        sendBtn.disabled = true;

        appendUserMessage(text);
        showTyping();
        
        conversationHistory.push({ role: "user", parts: [{ text: text }] });

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    system_instruction: { parts: [{ text: "You are Pocketassist. Be concise and helpful." }] },
                    contents: conversationHistory
                })
            });

            removeTyping();

            if (!response.ok) {
                // Handle specific error codes
                if (response.status === 400) throw new Error("Invalid API Key. Check your code.");
                if (response.status === 403) throw new Error("API Key restricted or region blocked.");
                if (response.status === 429) throw new Error("Too many requests. Slow down.");
                throw new Error(`Server Error (${response.status})`);
            }

            const data = await response.json();
            
            if (!data.candidates || !data.candidates[0].content) {
                throw new Error("Safety filter triggered. Try a different prompt.");
            }

            const botReply = data.candidates[0].content.parts[0].text;
            appendBotMessage(botReply);
            conversationHistory.push({ role: "model", parts: [{ text: botReply }] });

        } catch (error) {
            removeTyping();
            console.error(error);
            appendBotMessage(`Error: ${error.message}`, true);
            conversationHistory.pop(); // Remove failed message from history
        } finally {
            userInput.focus();
        }
    }

    // Helper: Add Copy Button to Code Blocks
    function addCopyButton(codeBlock) {
        const pre = codeBlock.parentElement;
        const wrapper = document.createElement('div');
        const header = document.createElement('div');
        header.className = 'code-header';
        header.innerHTML = `<span>Code</span> <button class="copy-btn">Copy</button>`;
        
        pre.parentNode.insertBefore(wrapper, pre);
        wrapper.appendChild(header);
        wrapper.appendChild(pre);
        
        const btn = header.querySelector('.copy-btn');
        btn.addEventListener('click', () => {
            navigator.clipboard.writeText(codeBlock.innerText).then(() => {
                btn.textContent = "Copied!";
                setTimeout(() => btn.textContent = "Copy", 2000);
            });
        });
    }

    // Helper: Escape HTML to prevent XSS
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
</script>

</body>
</html>
